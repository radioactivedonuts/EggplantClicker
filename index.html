<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍆 Eggplant Clicker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='75' font-size='70'%3E%F0%9F%8D%86%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --purple: #9b4dff; --pink: #ff4de8; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Press Start 2P', system-ui; background:#0a001f; color:#fff; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        .background { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(45deg,#1a0033,#330033); background-size:400% 400%; animation:gradientShift 20s ease infinite; z-index:-3; }
        @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .floating-eggplants { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-2; overflow:hidden; }
        .eggplant-float { position:absolute; font-size:2.2rem; opacity:0.12; animation:floatUp linear infinite; }
        @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg)} 100%{transform:translateY(-110vh) rotate(720deg)} }

        .game-container { display:flex; flex-direction:column; height:100vh; z-index:1; }
        header { background:rgba(20,0,40,0.95); backdrop-filter:blur(12px); border-bottom:4px solid var(--purple); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .points-display { font-size:2.4rem; font-weight:bold; text-shadow:0 0 20px var(--purple); }
        .main-content { display:flex; flex:1; overflow:hidden; gap:10px; padding:10px; }
        .panel { 
            background:rgba(30,10,60,0.88); 
            backdrop-filter:blur(12px); 
            border:2px solid rgba(155,77,255,0.6); 
            border-radius:16px; 
            padding:15px; 
            box-shadow:0 8px 32px rgba(0,0,0,0.6);
            overflow-y: auto;           /* Enable scrolling */
            max-height: calc(100vh - 120px); /* Make sure it scrolls */
        }
        .shop-container { max-height: calc(100vh - 180px); overflow-y: auto; } /* Extra scroll safety */
        .center-panel { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .eggplant-button { font-size:220px; cursor:pointer; transition:transform .08s cubic-bezier(0.175,0.885,0.32,1.275); filter:drop-shadow(0 0 50px #9b4dff); user-select:none; -webkit-user-select:none; }
        .eggplant-button:active { transform:scale(0.75) rotate(12deg); }
        button { background:rgba(155,77,255,0.9); color:white; border:none; padding:10px 16px; border-radius:8px; font-family:inherit; cursor:pointer; }
        .shop-item { background:rgba(50,20,80,0.8); border:2px solid var(--purple); border-radius:12px; padding:12px; margin-bottom:12px; cursor:pointer; transition:all .2s; }
        .shop-item.locked { background:#1a1a2e; border-color:#555; color:#888; cursor:not-allowed; }
        .shop-item:hover:not(.locked) { border-color:var(--pink); transform:translateX(6px); }
        .achievement { background:rgba(40,15,70,0.8); border:2px solid #555; border-radius:10px; padding:10px; margin-bottom:10px; }
        .achievement.unlocked { border-color:#ffd700; background:rgba(80,60,20,0.9); box-shadow:0 0 15px #ffd700; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="floating-eggplants" id="floating"></div>

    <div class="game-container">
        <header>
            <div class="points-display"><span id="points">0</span> 🍆</div>
            <div style="text-align:center">
                <div id="pps">0 /s</div>
                <div id="ppc">1 per click</div>
            </div>
        </header>

        <div class="main-content">
            <!-- SHOP (Scrollable) -->
            <div class="panel" style="width:420px;">
                <h2 style="text-align:center;margin-bottom:15px;color:#ffccff">🌱 UPGRADES</h2>
                <div id="shop" class="shop-container"></div>
            </div>

            <!-- MAIN CLICKER -->
            <div class="center-panel">
                <div id="eggplant" class="eggplant-button">🍆</div>
            </div>

            <!-- ACHIEVEMENTS -->
            <div class="panel" style="width:380px;">
                <h2 style="text-align:center;margin-bottom:15px">🏆 Achievements <span id="ach-count">(0/20)</span></h2>
                <div id="ach-list" style="max-height:520px;overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:2000;">
        <div style="background:#1a0033;border:5px solid #9b4dff;border-radius:20px;padding:30px;max-width:420px;text-align:center;" id="modal-content"></div>
    </div>

    <script>
        const suffixes = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","Ud"];
        function format(num) {
            if (num < 1000) return Math.floor(num).toLocaleString();
            let i = 0, n = num;
            while (n >= 1000 && i < suffixes.length-1) { n /= 1000; i++; }
            return n.toFixed(2).replace(/\.00$/, '') + suffixes[i];
        }

        let state = { points: 0, totalEarned: 0, clicks: 0, timePlayed: 0, multiplier: 1, ppc: 1, pps: 0, upgrades: [], achievements: [] };
        let audioCtx;

        function initUpgrades() {
            state.upgrades = [
                {id:0,name:"🍆 Better Eggplants",cost:25,owned:0,ppc:2,pps:0,scale:1.18,unlocked:true,desc:"+2 per click"},
                {id:1,name:"🚜 Eggplant Farm",cost:180,owned:0,ppc:0,pps:9,scale:1.16,unlocked:true,desc:"+9 / sec"},
                {id:2,name:"🧑‍🌾 Eggplant Farmers",cost:450,owned:0,ppc:0,pps:22,scale:1.15,unlocked:true,desc:"+22 / sec"},
                {id:3,name:"🚚 Eggplant Delivery Trucks",cost:1200,owned:0,ppc:0,pps:55,scale:1.14,unlocked:true,desc:"+55 / sec"},
                {id:4,name:"🏭 Eggplant Factory",cost:6500,owned:0,ppc:0,pps:180,scale:1.13,unlocked:true,desc:"+180 / sec"},
                {id:5,name:"🏬 Eggplant Warehouse",cost:28000,owned:0,ppc:0,pps:520,scale:1.12,unlocked:true,desc:"+520 / sec"},
                {id:6,name:"🧪 Eggplant Fertilizer Lab",cost:95000,owned:0,ppc:8,pps:950,scale:1.115,unlocked:true,desc:"+8 click & +950/sec"},
                {id:7,name:"🌱 Super Seeds",cost:320000,owned:0,ppc:0,pps:2800,scale:1.11,unlocked:true,desc:"+2,800 / sec"},
                {id:8,name:"🌧️ Irrigation Network",cost:950000,owned:0,ppc:0,pps:7200,scale:1.105,unlocked:true,desc:"+7,200 / sec"},
                {id:9,name:"🤖 Eggplant Robots",cost:4200000,owned:0,ppc:0,pps:18500,scale:1.10,unlocked:true,desc:"+18,500 / sec"},
                {id:10,name:"⚡ Mega Eggplant Reactor",cost:2.8e7,owned:0,ppc:0,pps:92000,scale:1.095,unlocked:false,revealAt:1e7,desc:"+92,000 / sec"},
                {id:11,name:"🛰️ Eggplant Satellite",cost:1.5e8,owned:0,ppc:25,pps:380000,scale:1.09,unlocked:false,revealAt:8e7,desc:"+25 click & +380K/sec"},
                {id:12,name:"🌋 Geothermal Eggplant Plant",cost:8.5e8,owned:0,ppc:0,pps:1.2e6,scale:1.085,unlocked:false,revealAt:5e8,desc:"+1.2M / sec"},
                {id:13,name:"☢️ Nuclear Eggplant Facility",cost:4.2e9,owned:0,ppc:0,pps:5.5e6,scale:1.08,unlocked:false,revealAt:2e9,desc:"+5.5M / sec"},
                {id:14,name:"🧬 Genetic Eggplant Laboratory",cost:2.1e10,owned:0,ppc:120,pps:2.8e7,scale:1.075,unlocked:false,revealAt:1e10,desc:"+120 click & +28M/sec"},
                {id:15,name:"🚀 Eggplant Space Program",cost:1.2e11,owned:0,ppc:0,pps:1.4e8,scale:1.07,unlocked:false,revealAt:8e10,desc:"+140M / sec"},
                {id:16,name:"🪐 Eggplant Moon Base",cost:6.5e11,owned:0,ppc:800,pps:3.2e9,scale:1.06,unlocked:false,revealAt:4e11,desc:"+800 click & +3.2B/sec"},
                {id:17,name:"🌍 Planetary Eggplant Colonies",cost:3.8e12,owned:0,ppc:0,pps:1.8e10,scale:1.055,unlocked:false,revealAt:2e12,desc:"+18B / sec"},
                {id:18,name:"⚛️ Quantum Eggplant Generator",cost:2.2e13,owned:0,ppc:4500,pps:9.5e10,scale:1.05,unlocked:false,revealAt:1e13,desc:"+4.5K click & +95B/sec"},
                {id:19,name:"👑 Eggplant Deity",cost:6e15,owned:0,ppc:25000,pps:2.8e12,scale:1.04,unlocked:false,revealAt:3e15,desc:"+25K click & +2.8T/sec"},
            ];
        }

        function initAchievements() {
            state.achievements = [
                {id:0,name:"First Click",desc:"Click the eggplant once",icon:"👆",check:()=>state.clicks>=1},
                {id:1,name:"Click Apprentice",desc:"100 clicks",icon:"🔨",check:()=>state.clicks>=100},
                {id:2,name:"Click Master",desc:"1,000 clicks",icon:"⚡",check:()=>state.clicks>=1000},
                {id:3,name:"Click Legend",desc:"10,000 clicks",icon:"🌟",check:()=>state.clicks>=10000},
                {id:4,name:"Eggplant Novice",desc:"Reach 1,000 points",icon:"🌱",check:()=>state.totalEarned>=1000},
                {id:5,name:"Eggplant Harvester",desc:"Reach 10,000 points",icon:"🌾",check:()=>state.totalEarned>=10000},
                {id:6,name:"Eggplant Tycoon",desc:"Reach 100,000 points",icon:"💰",check:()=>state.totalEarned>=100000},
                {id:7,name:"Eggplant Millionaire",desc:"Reach 1 Million points",icon:"🏦",check:()=>state.totalEarned>=1000000},
                {id:8,name:"First Purchase",desc:"Buy your first upgrade",icon:"🛒",check:()=>state.upgrades.some(u=>u.owned>0)},
                {id:9,name:"Automation",desc:"Reach 1,000 points per second",icon:"⚙️",check:()=>state.pps>=1000},
                {id:10,name:"Purple Power",desc:"Reach 100,000 points per second",icon:"🔋",check:()=>state.pps>=100000},
                {id:11,name:"Dedicated Grower",desc:"Play for 10 minutes",icon:"⏰",check:()=>state.timePlayed>=600},
                {id:12,name:"True Farmer",desc:"Play for 1 hour",icon:"🏆",check:()=>state.timePlayed>=3600},
                {id:13,name:"Cosmic Farmer",desc:"Unlock a hidden upgrade",icon:"🌌",check:()=>state.upgrades.some(u=>u.id>=10 && u.unlocked)},
                {id:14,name:"Master Clicker",desc:"Reach 500 per click",icon:"🎯",check:()=>state.ppc>=500},
                {id:15,name:"The Harvest Never Ends",desc:"Total earned exceeds 100 Billion",icon:"🌍",check:()=>state.totalEarned>=100000000000},
                {id:16,name:"Eggplant Addict",desc:"Click 50,000 times",icon:"🖱️",check:()=>state.clicks>=50000},
                {id:17,name:"Eggplant Empire",desc:"Own 100 total upgrades",icon:"🏰",check:()=>state.upgrades.reduce((a,u)=>a+(u.owned||0),0)>=100},
            ];
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = 420 + Math.random()*200;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.3;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function clickEggplant(e) {
            const earned = Math.floor(state.ppc * state.multiplier);
            state.points += earned;
            state.totalEarned += earned;
            state.clicks++;

            playClickSound();
            const p = document.createElement('div');
            p.textContent = `+${format(earned)}`;
            p.style.position = 'fixed';
            p.style.left = e.clientX + 'px';
            p.style.top = (e.clientY - 40) + 'px';
            p.style.fontSize = '1.6rem';
            p.style.zIndex = '100';
            p.style.pointerEvents = 'none';
            document.body.appendChild(p);
            setTimeout(() => { p.style.transition = 'all 1.5s'; p.style.transform = 'translateY(-180px)'; p.style.opacity = '0'; }, 10);
            setTimeout(() => p.remove(), 1600);

            updateUI();
            checkAchievements();
        }

        function buyUpgrade(id) {
            const up = state.upgrades.find(u => u.id === id);
            if (!up || !up.unlocked || state.points < up.cost) return;
            state.points -= up.cost;
            up.owned++;
            up.cost = Math.ceil(up.cost * up.scale);
            recalculateProduction();
            renderShop();
            updateUI();
            checkAchievements();
        }

        function recalculateProduction() {
            let ppc = 1, pps = 0;
            state.upgrades.forEach(up => {
                if (up.unlocked) {
                    ppc += (up.ppc || 0) * up.owned;
                    pps += (up.pps || 0) * up.owned;
                }
            });
            state.ppc = Math.floor(ppc);
            state.pps = Math.floor(pps);
        }

        function renderShop() {
            const container = document.getElementById('shop');
            container.innerHTML = '';
            state.upgrades.forEach(up => {
                const div = document.createElement('div');
                div.className = `shop-item ${!up.unlocked ? 'locked' : ''}`;
                if (up.unlocked) {
                    div.innerHTML = `<strong>${up.name}</strong><br><small>${up.desc}</small><br><span style="color:#ffccff">${format(up.cost)} 🍆</span> | x${up.owned}`;
                    div.onclick = () => buyUpgrade(up.id);
                } else {
                    div.innerHTML = `<strong>???</strong><br><small>Reach ${format(up.revealAt)} total</small>`;
                }
                container.appendChild(div);
            });
        }

        function renderAchievements() {
            const container = document.getElementById('ach-list');
            container.innerHTML = '';
            let count = 0;
            state.achievements.forEach(ach => {
                if (ach.unlocked) count++;
                const div = document.createElement('div');
                div.className = `achievement ${ach.unlocked ? 'unlocked' : ''}`;
                div.innerHTML = `<span style="font-size:2rem">${ach.icon}</span> <strong>${ach.name}</strong><br><small>${ach.desc}</small>`;
                container.appendChild(div);
            });
            document.getElementById('ach-count').textContent = `(${count}/20)`;
        }

        function checkAchievements() {
            state.achievements.forEach(ach => {
                if (!ach.unlocked && ach.check()) {
                    ach.unlocked = true;
                    showModal("🏆 ACHIEVEMENT UNLOCKED!", ach.name);
                    renderAchievements();
                }
            });
        }

        function updateUI() {
            document.getElementById('points').textContent = format(state.points);
            document.getElementById('pps').textContent = format(state.pps) + " /s";
            document.getElementById('ppc').textContent = format(state.ppc) + " per click";
        }

        function showModal(title, body) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-content').innerHTML = `
                <h2 style="color:#ffd700">${title}</h2>
                <p>${body}</p>
                <button onclick="closeModal()" style="margin-top:20px">OK</button>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function gameLoop() {
            if (state.pps > 0) {
                const earned = state.pps * state.multiplier / 10;
                state.points += earned;
                state.totalEarned += earned;
            }
            state.timePlayed += 0.1;
            updateUI();
            checkAchievements();
        }

        function initFloating() {
            const container = document.getElementById('floating');
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'eggplant-float';
                e.textContent = '🍆';
                e.style.left = Math.random() * 100 + '%';
                e.style.animationDuration = (20 + Math.random() * 25) + 's';
                container.appendChild(e);
                setTimeout(() => e.remove(), 65000);
            }, 800);
        }

        window.onload = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            initUpgrades();
            initAchievements();
            recalculateProduction();
            renderShop();
            renderAchievements();
            updateUI();
            initFloating();

            document.getElementById('eggplant').addEventListener('click', clickEggplant);

            setInterval(gameLoop, 100);

            showModal("🍆 Eggplant Clicker", "Scrolling on upgrades fixed!");
        };
    </script>
</body>
</html>
